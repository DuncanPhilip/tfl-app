<div class="flex h-screen w-screen flex-col">
  <!-- Top toolbar -->
  <div class="h-14 border-b border-gray-300 bg-gray-100 overflow-hidden">
    <app-top-panel></app-top-panel>
  </div>

  <!-- Resizable split: map and bottom panel -->
  <as-split direction="vertical" class="flex-1">
    <!-- Map pane -->
    <as-split-area [size]="70" class="overflow-hidden">
      <app-map></app-map>
    </as-split-area>

    <!-- Bottom large panel -->
    <as-split-area [size]="30" class="overflow-auto">
      <app-bottom-panel></app-bottom-panel>
    </as-split-area>
  </as-split>
</div>
